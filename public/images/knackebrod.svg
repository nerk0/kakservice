  <ellipse cx="185" cy="104" rx="2" ry="1" fill="#6B4E2A" opacity=".45"/>
  <ellipse cx="260" cy="102" rx="2" ry="1" fill="#6B4E2A" opacity=".45"/>

  <!-- Piece 1 (front/top) -->
  <rect x="60" y="70" width="240" height="48" rx="5" fill="#D4B68A"/>
  <circle cx="95"  cy="94" r="4.5" fill="#9A7050" opacity=".6"/>
  <circle cx="128" cy="94" r="4.5" fill="#9A7050" opacity=".6"/>
  <circle cx="161" cy="94" r="4.5" fill="#9A7050" opacity=".6"/>
  <circle cx="194" cy="94" r="4.5" fill="#9A7050" opacity=".6"/>
  <circle cx="227" cy="94" r="4.5" fill="#9A7050" opacity=".6"/>
  <circle cx="260" cy="94" r="4.5" fill="#9A7050" opacity=".6"/>
  <circle cx="293" cy="94" r="4.5" fill="#9A7050" opacity=".6"/>
