  <circle cx="115" cy="134" r="4" fill="#8B6A42" opacity=".7"/>
  <circle cx="145" cy="134" r="4" fill="#8B6A42" opacity=".7"/>
  <circle cx="175" cy="134" r="4" fill="#8B6A42" opacity=".7"/>
