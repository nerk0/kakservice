  <ellipse cx="110" cy="80" rx="2.5" ry="1.2" fill="#4A2C10" opacity=".45"/>
  <ellipse cx="148" cy="82" rx="2.5" ry="1.2" fill="#4A2C10" opacity=".45" transform="rotate(30 148 82)"/>
  <ellipse cx="210" cy="79" rx="2.5" ry="1.2" fill="#4A2C10" opacity=".45" transform="rotate(-20 210 79)"/>
  <ellipse cx="255" cy="83" rx="2.5" ry="1.2" fill="#4A2C10" opacity=".45" transform="rotate(15 255 83)"/>
  <!-- Top highlight -->
  <rect x="60" y="70" width="240" height="48" rx="5" fill="none" stroke="#E4CCA0" stroke-width="1.5" opacity=".6"/>
  <rect x="60" y="70" width="240" height="6" rx="3" fill="#EDD8B0" opacity=".3"/>


