  <circle cx="235" cy="134" r="4" fill="#8B6A42" opacity=".7"/>
  <circle cx="265" cy="134" r="4" fill="#8B6A42" opacity=".7"/>
  <circle cx="295" cy="134" r="4" fill="#8B6A42" opacity=".7"/>
  <!-- Surface texture -->
