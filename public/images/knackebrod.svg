  <ellipse cx="248" cy="123" rx="2" ry="1" fill="#6B4E2A" opacity=".5"/>
  <ellipse cx="280" cy="125" rx="2" ry="1" fill="#6B4E2A" opacity=".5"/>

  <!-- Piece 2 (mid) -->
  <rect x="70" y="90" width="240" height="48" rx="5" fill="#C4A07A"/>
  <circle cx="105" cy="114" r="4" fill="#8B6A42" opacity=".65"/>
  <circle cx="135" cy="114" r="4" fill="#8B6A42" opacity=".65"/>
  <circle cx="165" cy="114" r="4" fill="#8B6A42" opacity=".65"/>
  <circle cx="195" cy="114" r="4" fill="#8B6A42" opacity=".65"/>
  <circle cx="225" cy="114" r="4" fill="#8B6A42" opacity=".65"/>
  <circle cx="255" cy="114" r="4" fill="#8B6A42" opacity=".65"/>
  <circle cx="285" cy="114" r="4" fill="#8B6A42" opacity=".65"/>
  <rect x="70" y="90" width="240" height="48" rx="5" fill="none" stroke="#D4B68A" stroke-width="1.5" opacity=".5"/>
