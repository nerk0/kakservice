<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <!-- Background -->
  <rect width="400" height="220" fill="#EBF0DC"/>
  <circle cx="40"  cy="25"  r="1.5" fill="#3A492F" opacity=".12"/>
  <circle cx="370" cy="195" r="1.5" fill="#3A492F" opacity=".12"/>
  <circle cx="360" cy="28"  r="1"   fill="#D4A54C" opacity=".15"/>

  <!-- Shadow -->
