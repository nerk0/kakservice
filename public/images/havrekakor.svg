<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <radialGradient id="cookie" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#C8956A"/>
      <stop offset="100%" stop-color="#A06B3E"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="#F5EBD8"/>
  <circle cx="40"  cy="30"  r="1.5" fill="#D4A54C" opacity=".2"/>
  <circle cx="360" cy="190" r="1.5" fill="#D4A54C" opacity=".2"/>
  <circle cx="360" cy="30"  r="1"   fill="#3A492F" opacity=".08"/>

  <!-- Shadow -->
  <ellipse cx="200" cy="195" rx="140" ry="9" fill="rgba(0,0,0,0.06)"/>

  <!-- Cookie back-left -->
  <circle cx="108" cy="145" r="50" fill="#B07845"/>
  <!-- Oat texture lines -->
  <line x1="88"  y1="135" x2="128" y2="135" stroke="#8B5E2E" stroke-width="1.5" opacity=".35"/>
  <line x1="84"  y1="145" x2="132" y2="145" stroke="#8B5E2E" stroke-width="1.5" opacity=".35"/>
  <line x1="88"  y1="155" x2="128" y2="155" stroke="#8B5E2E" stroke-width="1.5" opacity=".35"/>
  <!-- Crisp edge highlight -->
  <circle cx="108" cy="145" r="50" fill="none" stroke="#D4A878" stroke-width="2" opacity=".4"/>

  <!-- Cookie back-right -->
  <circle cx="295" cy="143" r="50" fill="#B07845"/>
  <line x1="275" y1="133" x2="315" y2="133" stroke="#8B5E2E" stroke-width="1.5" opacity=".35"/>
  <line x1="271" y1="143" x2="319" y2="143" stroke="#8B5E2E" stroke-width="1.5" opacity=".35"/>
  <line x1="275" y1="153" x2="315" y2="153" stroke="#8B5E2E" stroke-width="1.5" opacity=".35"/>
  <circle cx="295" cy="143" r="50" fill="none" stroke="#D4A878" stroke-width="2" opacity=".4"/>

  <!-- Cookie front center -->
  <circle cx="200" cy="130" r="62" fill="url(#cookie)"/>
  <!-- Oat texture -->
  <line x1="168" y1="112" x2="232" y2="112" stroke="#8B5E2E" stroke-width="2" opacity=".28"/>
  <line x1="162" y1="124" x2="238" y2="124" stroke="#8B5E2E" stroke-width="2" opacity=".28"/>
  <line x1="160" y1="136" x2="240" y2="136" stroke="#8B5E2E" stroke-width="2" opacity=".28"/>
  <line x1="162" y1="148" x2="238" y2="148" stroke="#8B5E2E" stroke-width="2" opacity=".28"/>
  <line x1="168" y1="160" x2="232" y2="160" stroke="#8B5E2E" stroke-width="2" opacity=".28"/>
  <!-- Oat flakes (small ovals) -->
  <ellipse cx="185" cy="120" rx="5" ry="3" fill="#D4A878" opacity=".6" transform="rotate(-15 185 120)"/>
  <ellipse cx="215" cy="118" rx="5" ry="3" fill="#D4A878" opacity=".6" transform="rotate(10 215 118)"/>
  <ellipse cx="200" cy="132" rx="5" ry="3" fill="#D4A878" opacity=".6" transform="rotate(-5 200 132)"/>
  <ellipse cx="180" cy="145" rx="5" ry="3" fill="#D4A878" opacity=".6" transform="rotate(20 180 145)"/>
  <ellipse cx="218" cy="143" rx="5" ry="3" fill="#D4A878" opacity=".6" transform="rotate(-12 218 143)"/>
  <!-- Edge highlight -->
  <circle cx="200" cy="130" r="62" fill="none" stroke="#E8C090" stroke-width="2.5" opacity=".5"/>


</svg>
