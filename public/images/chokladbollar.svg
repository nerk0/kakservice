<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <radialGradient id="b1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4A2518"/>
      <stop offset="100%" stop-color="#1E0E08"/>
    </radialGradient>
    <radialGradient id="b2" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3D1E12"/>
      <stop offset="100%" stop-color="#180A04"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="#F5EBD8"/>
  <!-- Subtle grain dots -->
  <circle cx="30"  cy="20"  r="1.5" fill="#D4A54C" opacity=".18"/>
  <circle cx="370" cy="200" r="1.5" fill="#D4A54C" opacity=".18"/>
  <circle cx="350" cy="30"  r="1"   fill="#3A492F" opacity=".1"/>
  <circle cx="60"  cy="190" r="1"   fill="#3A492F" opacity=".1"/>

  <!-- Shadow ellipses -->
  <ellipse cx="200" cy="192" rx="130" ry="10" fill="rgba(0,0,0,0.07)"/>

  <!-- Ball left -->
  <circle cx="118" cy="148" r="42" fill="url(#b2)"/>
  <!-- Coconut sprinkles left -->
  <line x1="103" y1="136" x2="113" y2="133" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".55"/>
  <line x1="120" y1="128" x2="128" y2="130" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".45"/>
  <line x1="108" y1="150" x2="116" y2="148" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  <line x1="125" y1="160" x2="133" y2="157" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".4"/>

  <!-- Ball right -->
  <circle cx="284" cy="148" r="42" fill="url(#b2)"/>
  <!-- Coconut sprinkles right -->
  <line x1="270" y1="136" x2="280" y2="133" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".55"/>
  <line x1="287" y1="128" x2="295" y2="130" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".45"/>
  <line x1="275" y1="152" x2="283" y2="150" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  <line x1="290" y1="163" x2="298" y2="160" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".4"/>

  <!-- Ball center (front) -->
  <circle cx="200" cy="135" r="52" fill="url(#b1)"/>
  <!-- Coconut sprinkles center -->
  <line x1="182" y1="120" x2="195" y2="117" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
  <line x1="203" y1="112" x2="214" y2="115" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity=".5"/>
  <line x1="186" y1="138" x2="197" y2="135" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity=".55"/>
  <line x1="208" y1="148" x2="219" y2="145" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity=".45"/>
  <line x1="192" y1="155" x2="201" y2="153" stroke="#fff" stroke-width="2"   stroke-linecap="round" opacity=".4"/>


</svg>
